global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: wingfoil
    static_configs:
      # host.docker.internal resolves to the Docker host — where the wingfoil
      # test process binds its PrometheusExporter
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics
