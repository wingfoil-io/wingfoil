name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  preflight:
    name: Preflight — version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m 1 '^version' wingfoil/Cargo.toml | awk -F'"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Fail if tag already exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "::error::Tag ${TAG} already exists. Bump the version before releasing."
            exit 1
          fi

  all-tests:
    name: All Tests
    needs: preflight
    uses: ./.github/workflows/all-tests.yml
    secrets: inherit

  integration-tests:
    name: Integration Tests
    needs: preflight
    uses: ./.github/workflows/integration-tests.yml
    secrets: inherit

  zmq-integration:
    name: ZMQ Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run ZMQ integration tests
        run: |
          cargo test --features zmq-beta-integration-test -p wingfoil \
            -- --test-threads=1 zmq::integration_tests
        env:
          RUST_LOG: INFO

  etcd-integration:
    name: etcd Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Run etcd integration tests
        run: |
          cargo test --features etcd-integration-test -p wingfoil \
            -- --test-threads=1 etcd::integration_tests
        env:
          RUST_LOG: INFO

  zmq-etcd-integration:
    name: ZMQ etcd Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Run ZMQ etcd integration tests
        run: |
          cargo test --features zmq-etcd-integration-test -p wingfoil \
            -- --test-threads=1 zmq::integration_tests::etcd_tests
        env:
          RUST_LOG: INFO

  tag:
    name: Cut release tag
    needs: [preflight, all-tests, integration-tests, zmq-integration, etcd-integration, zmq-etcd-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
