name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  preflight:
    name: Preflight — version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m 1 '^version' wingfoil/Cargo.toml | awk -F'"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Fail if tag already exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "::error::Tag ${TAG} already exists. Bump the version before releasing."
            exit 1
          fi

  all-tests:
    name: All Tests
    needs: preflight
    uses: ./.github/workflows/all-tests.yml
    secrets: inherit

  etcd-integration:
    name: etcd Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Run etcd integration tests
        run: |
          cargo test --features etcd-integration-test -p wingfoil \
            -- --test-threads=1 etcd::integration_tests
        env:
          RUST_LOG: INFO

  telemetry-integration:
    name: Telemetry Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Start Grafana + Prometheus stack
        run: docker compose up -d
        working-directory: docker/grafana

      - name: Wait for Prometheus to be healthy
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:9090/-/healthy > /dev/null; then
              echo "Prometheus is up"
              break
            fi
            echo "Waiting for Prometheus... ($i/12)"
            sleep 5
          done
          curl -sf http://localhost:9090/-/healthy || (echo "Prometheus never became healthy" && exit 1)

      - name: Run Prometheus integration tests
        run: |
          cargo test --features prometheus-integration-test -p wingfoil \
            -- --test-threads=1 --nocapture
        env:
          RUST_LOG: INFO
          PROMETHEUS_TEST_URL: http://localhost:9090
          WINGFOIL_METRICS_PORT: "9091"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
        working-directory: docker/grafana

      - name: Tear down stack
        if: always()
        run: docker compose down
        working-directory: docker/grafana

  otlp-integration:
    name: OTLP Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run OTLP integration tests
        run: |
          cargo test --features otlp-integration-test -p wingfoil \
            -- --test-threads=1 --nocapture
        env:
          RUST_LOG: INFO

  tag:
    name: Cut release tag
    needs: [preflight, all-tests, etcd-integration, telemetry-integration, otlp-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
