name: release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  preflight:
    name: Preflight — version check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m 1 '^version' wingfoil/Cargo.toml | awk -F'"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Fail if tag already exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "::error::Tag ${TAG} already exists. Bump the version before releasing."
            exit 1
          fi

  all-tests:
    name: All Tests
    needs: preflight
    uses: ./.github/workflows/all-tests.yml
    secrets: inherit

  zmq-integration:
    name: ZMQ Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run ZMQ integration tests
        run: |
          cargo test --features zmq-integration-test -p wingfoil \
            -- --test-threads=1 zmq::integration_tests
        env:
          RUST_LOG: INFO

  tag:
    name: Cut release tag
    needs: [preflight, all-tests, zmq-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  publish-crates:
    name: Publish to crates.io
    needs: tag
    uses: ./.github/workflows/crates-publish.yml
    secrets: inherit

  publish-npm:
    name: Publish to npm
    needs: tag
    # id-token must be granted at the caller for OIDC to reach the reusable
    # workflow (reusable-workflow permissions are capped by the caller).
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/npm-publish.yml
    secrets: inherit

  publish-pypi:
    name: Publish to PyPI
    needs: tag
    uses: ./.github/workflows/pypi-publish.yml
    secrets: inherit
    with:
      pypi-target: prod
