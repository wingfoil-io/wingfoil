name: publish.pypi

on:
  workflow_dispatch:
    inputs:
      pypi-target:
        description: 'Choose PyPI target'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
  workflow_call:
    inputs:
      pypi-target:
        description: 'Choose PyPI target (test or prod)'
        required: true
        type: string

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Debug matrix
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Python version: ${{ matrix.python-version }}"

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Several transitive deps of the Python build (etcd-client, fluvio,
      # opentelemetry-proto) compile .proto files via prost-build at build
      # time, which needs the protobuf compiler. Install it cross-platform.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel and sdist
        run: |
          cd wingfoil-python
          maturin build --verbose --release --strip -o wheelhouse

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.os }}-${{ matrix.python-version }}
          path: wingfoil-python/wheelhouse

  upload-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-wheels
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Read `inputs.pypi-target`, NOT `github.event.inputs.pypi-target`. The
      # `inputs` context carries the value for both triggers (workflow_dispatch
      # *and* workflow_call). `github.event.inputs` is only populated for a
      # direct workflow_dispatch — on a workflow_call it reflects the *caller's*
      # triggering event, which for release.yml is a dispatch with no inputs, so
      # the value was empty and this step silently fell through to TestPyPI while
      # still reporting success. Fail loudly on anything unexpected instead of
      # defaulting to test, so a misrouted release can never masquerade as green.
      - name: Set PyPI target
        id: pypi
        run: |
          case "${{ inputs.pypi-target }}" in
            prod)
              echo "REPO_URL=https://upload.pypi.org/legacy/" >> $GITHUB_ENV
              echo "TOKEN_NAME=PROD_PYPI_API_TOKEN" >> $GITHUB_ENV
              ;;
            test)
              echo "REPO_URL=https://test.pypi.org/legacy/" >> $GITHUB_ENV
              echo "TOKEN_NAME=TEST_PYPI_API_TOKEN" >> $GITHUB_ENV
              ;;
            *)
              echo "::error::pypi-target must be 'test' or 'prod', got '${{ inputs.pypi-target }}'"
              exit 1
              ;;
          esac

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wingfoil-python/artifacts

      - name: Prepare artifacts
        run: |
          cd wingfoil-python
          ls -al artifacts
          mkdir wheelhouse
          find artifacts -name "*.whl" -exec cp {} wheelhouse/ \;
          ls -al wheelhouse

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: wingfoil-python/wheelhouse
          repository-url: ${{ env.REPO_URL }}
          verbose: true
          user: __token__
          password: ${{ secrets[env.TOKEN_NAME] }}
