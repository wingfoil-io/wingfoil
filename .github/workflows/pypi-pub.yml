name: PyPI Publish

on:
  workflow_dispatch:
    inputs:
      pypi-target:
        description: 'Choose PyPI target'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep building other matrix entries even if one fails so every
      # platform/Python error is surfaced in a single run rather than
      # hidden behind the first failure.
      fail-fast: false
      matrix:
        # Python 3.8 is EOL (Oct 2024) and has no macOS arm64 binaries,
        # which breaks setup-python on the current macos-latest runners.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Debug matrix
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Python version: ${{ matrix.python-version }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wingfoil-python

      # wingfoil-python enables the `etcd`, `otlp`, `prometheus`, and `zmq`
      # features, which transitively require `protoc` and `libzmq` at build
      # time. Linux already gets these via apt-get in the base image for most
      # things, but we install explicitly to be safe. macOS runners do not
      # ship these, so install via Homebrew. Windows is handled by vcpkg via
      # the zmq crate's build script (libzmq) and choco (protoc).
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libzmq3-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf zeromq

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Install maturin
        run: pip install "maturin>=1.4,<2.0"

      - name: Build wheel
        working-directory: wingfoil-python
        run: maturin build --verbose --release --strip -o wheelhouse --interpreter python${{ matrix.python-version }}

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.os }}-${{ matrix.python-version }}
          path: wingfoil-python/wheelhouse

  upload-pypi:
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set PyPI target
        id: pypi
        run: |
          if [ "${{ github.event.inputs.pypi-target }}" = "prod" ]; then
            echo "REPO_URL=https://upload.pypi.org/legacy/" >> $GITHUB_ENV
            echo "TOKEN_NAME=PROD_PYPI_API_TOKEN" >> $GITHUB_ENV
          else
            echo "REPO_URL=https://test.pypi.org/legacy/" >> $GITHUB_ENV
            echo "TOKEN_NAME=TEST_PYPI_API_TOKEN" >> $GITHUB_ENV
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: wingfoil-python/artifacts

      - name: Prepare artifacts
        run: |
          cd wingfoil-python
          ls -al artifacts
          mkdir wheelhouse
          find artifacts -name "*.whl" -exec cp {} wheelhouse/ \;
          ls -al wheelhouse

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: wingfoil-python/wheelhouse
          repository-url: ${{ env.REPO_URL }}
          verbose: true
          user: __token__
          password: ${{ secrets[env.TOKEN_NAME] }}
