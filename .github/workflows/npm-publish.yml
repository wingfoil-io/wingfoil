name: publish.npm

on:
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-pub

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # >=10.12 required for npm OIDC trusted publishing
          version: 10

      # NB: do NOT pass `registry-url` here. setup-node's registry-url support
      # writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into a temp
      # .npmrc and exports a placeholder NODE_AUTH_TOKEN. The npm client then
      # sees a (bogus) credential and uses token auth instead of OIDC trusted
      # publishing, which fails with a 404. With no token configured it uses
      # OIDC. The default registry is already registry.npmjs.org.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node >= 22.14 is required for npm OIDC trusted publishing.
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: wingfoil-js/pnpm-lock.yaml

      - name: Install JS deps
        working-directory: wingfoil-js
        run: pnpm install --frozen-lockfile

      - name: Build wasm bundle
        working-directory: wingfoil-js
        run: pnpm run build:wasm

      - name: Build TypeScript
        working-directory: wingfoil-js
        run: pnpm run build:ts

      - name: Lint
        working-directory: wingfoil-js
        run: pnpm run lint

      # Sanity check: dist/wasm/ is the only path that survives both
      # npm-packlist's nested-.gitignore quirk *and* esm.sh's relative-import
      # canonicalisation (a `../` import out of `dist/` gets rewritten to
      # `https://esm.sh/<dir>/...` as if it were a top-level package). Verify
      # the packlist tarball actually contains the wasm bindings before we
      # publish — a missing wasm here means a broken release on npm.
      - name: Verify wasm files are packaged
        working-directory: wingfoil-js
        run: |
          set -euo pipefail
          tarball=$(pnpm pack --pack-destination /tmp 2>&1 | tail -n1)
          if ! tar tzf "$tarball" | grep -q 'dist/wasm/wingfoil_wasm_bg\.wasm$'; then
            echo "::error::publish tarball is missing dist/wasm/ — refusing to publish"
            tar tzf "$tarball"
            exit 1
          fi

      # Publish with the npm CLI, not pnpm: OIDC trusted publishing is only
      # implemented in npm (>= 11.5.1), not pnpm (see pnpm/pnpm#9812), so
      # `pnpm publish` falls through to ENEEDAUTH. Node 22 ships npm 10.x, so
      # upgrade npm first. Auth is handled by OIDC (id-token: write above); the
      # trusted publisher for wingfoil-io/wingfoil + npm-publish.yml must be
      # registered on npmjs.com for @wingfoil/client. No NPM_TOKEN needed, and
      # provenance is emitted automatically.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        working-directory: wingfoil-js
        run: npm publish --access public
