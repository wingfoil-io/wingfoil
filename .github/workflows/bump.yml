name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Version bump type (major, minor, or patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WF_REBASE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-edit

      - name: Compute new version
        id: bump_cargo
        run: |
          BUMP_TYPE="${{ github.event.inputs['bump-type'] }}"
          CARGO_VERSION=$(grep -m 1 '^version' wingfoil/Cargo.toml | awk -F'"' '{print $2}')
          NPM_VERSION=$(node -p "require('./wingfoil-js/package.json').version")
          BASE=$(printf '%s\n%s\n' "$CARGO_VERSION" "$NPM_VERSION" | sort -V | tail -n 1)
          IFS='.' read -r MAJ MIN PATCH <<< "$BASE"
          case "$BUMP_TYPE" in
            major) MAJ=$((MAJ + 1)); MIN=0; PATCH=0 ;;
            minor) MIN=$((MIN + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "unknown bump type: $BUMP_TYPE" >&2; exit 1 ;;
          esac
          NEW_VERSION="${MAJ}.${MIN}.${PATCH}"
          echo "Cargo: $CARGO_VERSION, npm: $NPM_VERSION, base: $BASE, new: $NEW_VERSION"
          cargo set-version "$NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update conf.py with new version
        run: |
          NEW_VERSION="${{ steps.bump_cargo.outputs.new_version }}"
          CONF_PATH="wingfoil-python/docs/conf.py"
          sed -i "s/^release = .*/release = '$NEW_VERSION'/" $CONF_PATH

      - name: Bump wingfoil-js package.json version
        working-directory: wingfoil-js
        run: npm version --no-git-tag-version ${{ steps.bump_cargo.outputs.new_version }}

      - name: Update latency_e2e importmap pin
        run: |
          NEW_VERSION="${{ steps.bump_cargo.outputs.new_version }}"
          INDEX_HTML="wingfoil/examples/latency_e2e/static/index.html"
          sed -i -E "s|(esm\.sh/@wingfoil/client@)[0-9]+\.[0-9]+\.[0-9]+|\1${NEW_VERSION}|g" "$INDEX_HTML"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "bump: ${{ github.event.inputs['bump-type'] }} version to ${{ steps.bump_cargo.outputs.new_version }}"

      - name: Push changes
        run: git push
