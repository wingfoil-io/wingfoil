name: KDB Integration Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "wingfoil/src/adapters/kdb/**"
      - "wingfoil-python/src/py_kdb.rs"
      - "wingfoil-python/tests/test_kdb.py"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  kdb-integration:
    name: KDB Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Start KDB container
        run: |
          docker run -d \
            --name kdb \
            -p 5000:5000 \
            kysely/kdbq-server

      - name: Wait for KDB to be ready
        run: |
          for i in $(seq 1 30); do
            nc -z localhost 5000 && echo "KDB ready" && break
            echo "Waiting... ($i/30)"
            sleep 1
          done
          nc -z localhost 5000 || (echo "KDB never became ready" && exit 1)

      - name: Run Rust KDB integration tests
        env:
          KDB_TEST_HOST: localhost
          KDB_TEST_PORT: 5000
          RUST_LOG: INFO
        run: |
          cargo test --features kdb-integration-test -p wingfoil \
            -- --test-threads=1 --nocapture

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin and build Python bindings
        run: |
          pip install maturin pytest
          cd wingfoil-python && maturin develop

      - name: Run Python KDB integration tests
        env:
          KDB_TEST_HOST: localhost
          KDB_TEST_PORT: 5000
          RUST_LOG: INFO
        run: |
          cd wingfoil-python && pytest tests/test_kdb.py -v

      - name: Dump KDB logs on failure
        if: failure()
        run: docker logs kdb

      - name: Stop KDB container
        if: always()
        run: docker stop kdb && docker rm kdb
