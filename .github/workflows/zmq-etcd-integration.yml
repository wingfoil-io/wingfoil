name: ZMQ etcd Integration Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - 'wingfoil/src/adapters/zmq/**'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  zmq-etcd-integration:
    name: ZMQ etcd Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Run ZMQ etcd integration tests
        run: |
          cargo test --features zmq-etcd-integration-test -p wingfoil \
            -- --test-threads=1 --nocapture zmq::integration_tests::etcd_tests
        env:
          RUST_LOG: INFO
