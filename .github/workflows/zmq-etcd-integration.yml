name: ZMQ etcd Integration Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - 'wingfoil/src/adapters/zmq/**'
      - 'wingfoil-python/src/py_zmq.rs'
      - 'wingfoil-python/tests/test_zmq.py'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  zmq-etcd-integration:
    name: ZMQ etcd Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Pre-pull etcd image
        # testcontainers pulls the image lazily on first use, which is
        # vulnerable to transient registry flakes (e.g. "bytes remaining
        # on stream"). Pull once up front with retries so every test
        # reuses the cached image.
        run: |
          for i in 1 2 3; do
            docker pull gcr.io/etcd-development/etcd:v3.5.0 && exit 0
            echo "pull attempt $i failed, retrying..."
            sleep 5
          done
          echo "failed to pull etcd image after 3 attempts" && exit 1

      - name: Run ZMQ etcd integration tests
        run: |
          cargo test --features zmq-etcd-integration-test -p wingfoil \
            -- --test-threads=1 --nocapture zmq::integration_tests::etcd_tests
        env:
          RUST_LOG: INFO

      - name: Start etcd container for Python tests
        run: |
          docker run -d \
            --name etcd-py \
            -p 2379:2379 \
            -e ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379 \
            -e ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379 \
            gcr.io/etcd-development/etcd:v3.5.0
          for i in $(seq 1 30); do
            nc -z localhost 2379 && echo "etcd ready" && break
            echo "Waiting... ($i/30)"
            sleep 1
          done
          nc -z localhost 2379 || (echo "etcd never became ready" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: wingfoil-python/pyproject.toml

      - name: Install maturin and build Python bindings
        run: |
          python -m venv wingfoil-python/.venv
          wingfoil-python/.venv/bin/pip install maturin pytest pyzmq
          cd wingfoil-python && .venv/bin/maturin develop

      - name: Run Python zmq+etcd integration tests
        run: |
          cd wingfoil-python && .venv/bin/pytest -m requires_etcd tests/test_zmq.py -v
        env:
          RUST_LOG: INFO

      - name: Dump etcd logs on failure
        if: failure()
        run: docker logs etcd-py

      - name: Stop etcd container
        if: always()
        run: docker stop etcd-py && docker rm etcd-py
