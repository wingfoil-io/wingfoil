[features]
default = ["async"]
full = ["async", "csv", "kdb", "zmq-beta", "etcd", "dynamic-graph-beta"]
dynamic-graph-beta = []
kdb-integration-test = ["kdb"]
async = ["dep:tokio", "dep:futures", "dep:async-stream", "dep:futures-util", "tokio/time"]
csv = ["dep:csv"]
kdb = ["dep:kdb-plus-fixed", "dep:sha2", "dep:bincode", "async", "tokio/fs"]
zmq-beta = ["dep:zmq", "dep:bincode"]
etcd = ["dep:etcd-client", "async"]
etcd-integration-test = ["etcd", "dep:testcontainers"]

[package]
name = "wingfoil"
version = "3.3.0"
authors = ["wingfoil@wingfoil.io"]
edition = "2024"
publish = ["wingfoil", "crates-io"]
license = "Apache-2.0"
keywords = ["graph", "stream", "dag", "hft", "trading"]
homepage = "https://github.com/wingfoil-io/wingfoil/"
documentation = "https://docs.rs/wingfoil"
description = "graph based stream processing framework"

[lib]
name="wingfoil"

[package.metadata.docs.rs]
scrape-examples = true

[dependencies]

# derives
wingfoil-derive = { path = "../wingfoil-derive", version = "3.3.0" }

# workspace
chrono = {workspace=true}
derive_more = {workspace=true}
env_logger = {workspace=true}
log = {workspace=true}
lazy_static = {workspace=true}


# project
priority-queue = "2.7.0"
itertools = "0.14.0"
num = "0.4.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
crossbeam = "0.8.4"
lobster = "0.7.0"
num-traits = "0.2"
derive-new = "0.7"
serde-aux = "4.7.0"
smallvec = "1.15.1"
rand = "0.9.2"
tynm = "0.2.0"
kanal = "0.1.1"
scopeguard = "1.2.0"
strum = {version = "0.27.2", features = ["derive"]}
strum_macros = "0.27.2"
formato = "0.3.0"
once_cell = "1.21.3"
anyhow = "1.0.100"
tinyvec = { version = "1.10.0", features = ["alloc"] }
arrayvec = { version = "0.7", features = ["serde"] }
criterion = { version = "0.8.1" }
quanta = "0.9.3"
ordered-float = "4.5.0"
bincode = { version = "1.3.3", optional = true }
sha2 = { version = "0.10", optional = true }

# optional deps gated by feature flags
tokio = { version = "1", features = ["rt-multi-thread"], optional = true }
futures = { version = "0.3", optional = true }
async-stream = { version = "0.3.6", optional = true }
futures-util = { version = "0.3.31", optional = true }
csv = { version = "1.4", optional = true }
kdb-plus-fixed = { version = "0.5.0", features = ["ipc"], optional = true }
zmq = { version = "0.10.0", optional = true }
etcd-client = { version = "0.18", optional = true }
testcontainers = { version = "0.27", features = ["blocking"], optional = true }


[dev-dependencies]
rxrust = "1.0.0-rc.3"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
cargo-husky = { version = "1", default-features = false, features = ["user-hooks"] }

[[example]]
name = "dynamic-group"
