[[example]]
name = "order_book"
required-features = ["csv"]

[[example]]
name = "kdb_round_trip"
path = "examples/kdb/round_trip/main.rs"
required-features = ["kdb"]

[[example]]
name = "kdb_read"
path = "examples/kdb/read/main.rs"
